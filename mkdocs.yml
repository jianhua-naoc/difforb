site_name: DiffOrb
site_description: Differentiable small-body orbit computation and orbit determination with JAX.
site_url: https://difforb.readthedocs.io/en/latest/
docs_dir: docs

theme:
  name: material
  language: en
  logo: assets/brand/difforb-logo-white.png
  favicon: assets/brand/difforb-logo-favicon.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/lightbulb-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: numpy
            docstring_options:
              warn_unknown_params: false
              warn_missing_types: false
            inherited_members: false
            members_order: source
            merge_init_into_class: true
            show_root_heading: true
            show_root_full_path: false
            show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/vendor/katex/dist/katex.min.css
  - stylesheets/header.css

extra_javascript:
  - assets/vendor/katex/dist/katex.min.js
  - assets/vendor/katex/dist/contrib/auto-render.min.js
  - javascripts/katex.js

