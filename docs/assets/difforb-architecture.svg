<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 930" role="img" aria-labelledby="title desc">
  <title id="title">DiffOrb architecture</title>
  <desc id="desc">A three-panel architecture diagram for DiffOrb showing numerical core contracts, forward prediction models, and orbit determination workflows.</desc>
  <defs>
    <marker id="arrow-dark" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f1f1f" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a515d" />
    </marker>
    <style>
      .page { fill: #ffffff; }
      .title { fill: #0f172a; font: 700 34px "Times New Roman", Times, serif; }
      .subtitle { fill: #334155; font: italic 18px "Times New Roman", Times, serif; }
      .panel { fill: none; stroke: #1f1f1f; stroke-width: 2; stroke-dasharray: 9 8; }
      .panel-label { fill: #111827; font: 700 22px "Times New Roman", Times, serif; }
      .output { fill: #111827; font: 700 18px "Times New Roman", Times, serif; }
      .module-shell { fill: #ffffff; stroke: #1f1f1f; stroke-width: 1.7; }
      .module-peach { fill: #fde0bd; stroke: #1f1f1f; stroke-width: 1.5; }
      .module-blue { fill: #bfd6ee; stroke: #1f1f1f; stroke-width: 1.5; }
      .module-green { fill: #d7e7cf; stroke: #1f1f1f; stroke-width: 1.5; }
      .module-white { fill: #fffefe; stroke: #1f1f1f; stroke-width: 1.5; }
      .module-title { fill: #111827; font: 700 17px "Times New Roman", Times, serif; }
      .module-subtitle { fill: #334155; font: 14px "Times New Roman", Times, serif; }
      .tiny { fill: #334155; font: 12px "Times New Roman", Times, serif; }
      .flow { fill: none; stroke: #1f1f1f; stroke-width: 1.6; marker-end: url(#arrow-dark); }
      .flow-plain { fill: none; stroke: #1f1f1f; stroke-width: 1.6; }
      .red-flow { fill: none; stroke: #9a515d; stroke-width: 1.7; marker-end: url(#arrow-red); }
      .red-flow-soft { fill: none; stroke: #9a515d; stroke-width: 1.4; opacity: 0.9; }
      .red-label { fill: #7f3f49; font: italic 15px "Times New Roman", Times, serif; }
      .badge { fill: #d7e7cf; stroke: #1f1f1f; stroke-width: 1.2; }
      .badge-text { fill: #111827; font: 700 12px "Times New Roman", Times, serif; }
      .note { fill: #f8fafc; stroke: #1f1f1f; stroke-width: 1.3; stroke-dasharray: 4 4; }
      .note-title { fill: #111827; font: 700 14px "Times New Roman", Times, serif; }
      .note-text { fill: #334155; font: 12px "Times New Roman", Times, serif; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="930" />

  <text class="title" x="800" y="44" text-anchor="middle">DiffOrb Architecture</text>
  <text class="subtitle" x="800" y="74" text-anchor="middle">Differentiable small-body orbit prediction and orbit determination on JAX</text>

  <g id="panel-core">
    <text class="output" x="275" y="104" text-anchor="middle">Reusable Contracts</text>
    <line class="flow" x1="275" y1="136" x2="275" y2="112" />
    <rect class="panel" x="60" y="136" width="430" height="620" rx="20" />

    <rect class="module-shell" x="107" y="155" width="336" height="65" rx="7" />
    <rect class="module-peach" x="145" y="172" width="260" height="31" rx="5" />
    <text class="module-title" x="275" y="194" text-anchor="middle">core kernels</text>
    <text class="module-subtitle" x="275" y="215" text-anchor="middle">shared numerical foundations</text>

    <circle cx="275" cy="242" r="11" fill="#ffffff" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="268" y1="242" x2="282" y2="242" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="275" y1="235" x2="275" y2="249" stroke="#1f1f1f" stroke-width="1.3" />
    <line class="flow-plain" x1="275" y1="231" x2="275" y2="220" />
    <line class="flow" x1="275" y1="275" x2="275" y2="253" />

    <rect class="module-shell" x="107" y="285" width="336" height="65" rx="7" />
    <rect class="module-blue" x="145" y="302" width="260" height="31" rx="5" />
    <text class="module-title" x="275" y="324" text-anchor="middle">JAX PyTrees</text>
    <text class="module-subtitle" x="275" y="345" text-anchor="middle">differentiable array contracts</text>
    <rect class="badge" x="415" y="306" width="42" height="20" rx="4" />
    <text class="badge-text" x="436" y="320" text-anchor="middle">AD</text>

    <circle cx="275" cy="372" r="11" fill="#ffffff" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="268" y1="372" x2="282" y2="372" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="275" y1="365" x2="275" y2="379" stroke="#1f1f1f" stroke-width="1.3" />
    <line class="flow-plain" x1="275" y1="361" x2="275" y2="350" />
    <line class="flow" x1="275" y1="405" x2="275" y2="383" />

    <rect class="module-shell" x="107" y="415" width="336" height="65" rx="7" />
    <rect class="module-blue" x="145" y="432" width="260" height="31" rx="5" />
    <text class="module-title" x="275" y="454" text-anchor="middle">core/batch</text>
    <text class="module-subtitle" x="275" y="475" text-anchor="middle">scalar, broadcast, and grid dispatch</text>
    <rect class="badge" x="409" y="436" width="56" height="20" rx="4" />
    <text class="badge-text" x="437" y="450" text-anchor="middle">vmap</text>

    <circle cx="275" cy="502" r="11" fill="#ffffff" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="268" y1="502" x2="282" y2="502" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="275" y1="495" x2="275" y2="509" stroke="#1f1f1f" stroke-width="1.3" />
    <line class="flow-plain" x1="275" y1="491" x2="275" y2="480" />
    <line class="flow" x1="275" y1="535" x2="275" y2="513" />

    <rect class="module-shell" x="107" y="545" width="336" height="65" rx="7" />
    <rect class="module-peach" x="145" y="562" width="260" height="31" rx="5" />
    <text class="module-title" x="275" y="584" text-anchor="middle">state + element</text>
    <text class="module-subtitle" x="275" y="605" text-anchor="middle">frames, epochs, Cartesian, Keplerian</text>

    <circle cx="275" cy="632" r="11" fill="#ffffff" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="268" y1="632" x2="282" y2="632" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="275" y1="625" x2="275" y2="639" stroke="#1f1f1f" stroke-width="1.3" />
    <line class="flow-plain" x1="275" y1="621" x2="275" y2="610" />
    <line class="flow" x1="275" y1="665" x2="275" y2="643" />

    <rect class="module-shell" x="107" y="675" width="336" height="65" rx="7" />
    <rect class="module-green" x="145" y="692" width="260" height="31" rx="5" />
    <text class="module-title" x="275" y="714" text-anchor="middle">time, EOP, data</text>
    <text class="module-subtitle" x="275" y="735" text-anchor="middle">TT/TDB/UT1, Earth rotation, constants</text>

    <rect class="module-white" x="149" y="781" width="252" height="42" rx="7" />
    <text class="module-title" x="275" y="807" text-anchor="middle">User Inputs</text>
    <line class="flow" x1="275" y1="781" x2="275" y2="744" />

    <text class="panel-label" x="275" y="870" text-anchor="middle">(a) Numerical Core</text>
  </g>

  <g id="panel-forward-model">
    <text class="output" x="800" y="104" text-anchor="middle">Prediction Products</text>
    <line class="flow" x1="800" y1="136" x2="800" y2="112" />
    <rect class="panel" x="585" y="136" width="430" height="620" rx="20" />

    <rect class="module-shell" x="632" y="155" width="336" height="65" rx="7" />
    <rect class="module-peach" x="670" y="172" width="260" height="31" rx="5" />
    <text class="module-title" x="800" y="194" text-anchor="middle">ephemeris/</text>
    <text class="module-subtitle" x="800" y="215" text-anchor="middle">optical, radar, vector, element tables</text>

    <circle cx="800" cy="242" r="11" fill="#ffffff" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="793" y1="242" x2="807" y2="242" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="800" y1="235" x2="800" y2="249" stroke="#1f1f1f" stroke-width="1.3" />
    <line class="flow-plain" x1="800" y1="231" x2="800" y2="220" />
    <line class="flow" x1="800" y1="275" x2="800" y2="253" />

    <rect class="module-shell" x="632" y="285" width="336" height="65" rx="7" />
    <rect class="module-blue" x="670" y="302" width="260" height="31" rx="5" />
    <text class="module-title" x="800" y="324" text-anchor="middle">astrometry/reduction</text>
    <text class="module-subtitle" x="800" y="345" text-anchor="middle">optical line of sight, radar light time</text>
    <rect class="badge" x="943" y="306" width="42" height="20" rx="4" />
    <text class="badge-text" x="964" y="320" text-anchor="middle">LT</text>

    <circle cx="800" cy="372" r="11" fill="#ffffff" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="793" y1="372" x2="807" y2="372" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="800" y1="365" x2="800" y2="379" stroke="#1f1f1f" stroke-width="1.3" />
    <line class="flow-plain" x1="800" y1="361" x2="800" y2="350" />
    <line class="flow" x1="800" y1="405" x2="800" y2="383" />

    <rect class="module-shell" x="632" y="415" width="336" height="65" rx="7" />
    <rect class="module-blue" x="670" y="432" width="260" height="31" rx="5" />
    <text class="module-title" x="800" y="454" text-anchor="middle">integrator/</text>
    <text class="module-subtitle" x="800" y="475" text-anchor="middle">diffrax DOPRI and IAS15 propagation</text>
    <rect class="badge" x="937" y="436" width="56" height="20" rx="4" />
    <text class="badge-text" x="965" y="450" text-anchor="middle">dense</text>

    <circle cx="800" cy="502" r="11" fill="#ffffff" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="793" y1="502" x2="807" y2="502" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="800" y1="495" x2="800" y2="509" stroke="#1f1f1f" stroke-width="1.3" />
    <line class="flow-plain" x1="800" y1="491" x2="800" y2="480" />
    <line class="flow" x1="800" y1="535" x2="800" y2="513" />

    <rect class="module-shell" x="632" y="545" width="336" height="65" rx="7" />
    <rect class="module-peach" x="670" y="562" width="260" height="31" rx="5" />
    <text class="module-title" x="800" y="584" text-anchor="middle">dynamics/</text>
    <text class="module-subtitle" x="800" y="605" text-anchor="middle">Newtonian, PPN, J2, non-grav terms</text>
    <rect class="badge" x="943" y="566" width="42" height="20" rx="4" />
    <text class="badge-text" x="964" y="580" text-anchor="middle">GM</text>

    <circle cx="800" cy="632" r="11" fill="#ffffff" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="793" y1="632" x2="807" y2="632" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="800" y1="625" x2="800" y2="639" stroke="#1f1f1f" stroke-width="1.3" />
    <line class="flow-plain" x1="800" y1="621" x2="800" y2="610" />
    <line class="flow" x1="800" y1="665" x2="800" y2="643" />

    <rect class="module-shell" x="632" y="675" width="336" height="65" rx="7" />
    <rect class="module-green" x="670" y="692" width="260" height="31" rx="5" />
    <text class="module-title" x="800" y="714" text-anchor="middle">spk/ + body/</text>
    <text class="module-subtitle" x="800" y="735" text-anchor="middle">kernels, major bodies, sites, targets</text>

    <rect class="module-white" x="674" y="781" width="252" height="42" rx="7" />
    <text class="module-title" x="800" y="807" text-anchor="middle">Kernels + Grids</text>
    <line class="flow" x1="800" y1="781" x2="800" y2="744" />

    <path class="red-flow-soft" d="M 984 311 C 1005 311 1005 218 968 188" />
    <path class="red-flow-soft" d="M 984 441 C 1010 441 1010 319 968 318" />
    <path class="red-flow-soft" d="M 984 571 C 1015 571 1015 441 968 448" />
    <text class="red-label" x="1004" y="381" transform="rotate(90 1004 381)" text-anchor="middle">shared differentiable model</text>

    <text class="panel-label" x="800" y="870" text-anchor="middle">(b) Forward Prediction</text>
  </g>

  <g id="panel-od">
    <text class="output" x="1325" y="104" text-anchor="middle">Solved Orbit</text>
    <line class="flow" x1="1325" y1="136" x2="1325" y2="112" />
    <rect class="panel" x="1110" y="136" width="430" height="620" rx="20" />

    <rect class="module-shell" x="1157" y="155" width="336" height="65" rx="7" />
    <rect class="module-peach" x="1195" y="172" width="260" height="31" rx="5" />
    <text class="module-title" x="1325" y="194" text-anchor="middle">od/outlier + result</text>
    <text class="module-subtitle" x="1325" y="215" text-anchor="middle">fit masks, covariance, reports</text>
    <rect class="badge" x="1468" y="176" width="42" height="20" rx="4" />
    <text class="badge-text" x="1489" y="190" text-anchor="middle">mask</text>

    <circle cx="1325" cy="242" r="11" fill="#ffffff" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="1318" y1="242" x2="1332" y2="242" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="1325" y1="235" x2="1325" y2="249" stroke="#1f1f1f" stroke-width="1.3" />
    <line class="flow-plain" x1="1325" y1="231" x2="1325" y2="220" />
    <line class="flow" x1="1325" y1="275" x2="1325" y2="253" />

    <rect class="module-shell" x="1157" y="285" width="336" height="65" rx="7" />
    <rect class="module-blue" x="1195" y="302" width="260" height="31" rx="5" />
    <text class="module-title" x="1325" y="324" text-anchor="middle">od/dc + od/lsq</text>
    <text class="module-subtitle" x="1325" y="345" text-anchor="middle">residuals, normal equations, LM steps</text>
    <rect class="badge" x="1475" y="306" width="30" height="20" rx="4" />
    <text class="badge-text" x="1490" y="320" text-anchor="middle">J</text>

    <circle cx="1325" cy="372" r="11" fill="#ffffff" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="1318" y1="372" x2="1332" y2="372" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="1325" y1="365" x2="1325" y2="379" stroke="#1f1f1f" stroke-width="1.3" />
    <line class="flow-plain" x1="1325" y1="361" x2="1325" y2="350" />
    <line class="flow" x1="1325" y1="405" x2="1325" y2="383" />

    <rect class="module-shell" x="1157" y="415" width="336" height="65" rx="7" />
    <rect class="module-peach" x="1195" y="432" width="260" height="31" rx="5" />
    <text class="module-title" x="1325" y="454" text-anchor="middle">od/iod</text>
    <text class="module-subtitle" x="1325" y="475" text-anchor="middle">short-arc initial orbit candidates</text>

    <circle cx="1325" cy="502" r="11" fill="#ffffff" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="1318" y1="502" x2="1332" y2="502" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="1325" y1="495" x2="1325" y2="509" stroke="#1f1f1f" stroke-width="1.3" />
    <line class="flow-plain" x1="1325" y1="491" x2="1325" y2="480" />
    <line class="flow" x1="1325" y1="535" x2="1325" y2="513" />

    <rect class="module-shell" x="1157" y="545" width="336" height="65" rx="7" />
    <rect class="module-green" x="1195" y="562" width="260" height="31" rx="5" />
    <text class="module-title" x="1325" y="584" text-anchor="middle">bias + weight</text>
    <text class="module-subtitle" x="1325" y="605" text-anchor="middle">debiasing and inverse variance policies</text>
    <rect class="badge" x="1468" y="566" width="42" height="20" rx="4" />
    <text class="badge-text" x="1489" y="580" text-anchor="middle">W</text>

    <circle cx="1325" cy="632" r="11" fill="#ffffff" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="1318" y1="632" x2="1332" y2="632" stroke="#1f1f1f" stroke-width="1.3" />
    <line x1="1325" y1="625" x2="1325" y2="639" stroke="#1f1f1f" stroke-width="1.3" />
    <line class="flow-plain" x1="1325" y1="621" x2="1325" y2="610" />
    <line class="flow" x1="1325" y1="665" x2="1325" y2="643" />

    <rect class="module-shell" x="1157" y="675" width="336" height="65" rx="7" />
    <rect class="module-blue" x="1195" y="692" width="260" height="31" rx="5" />
    <text class="module-title" x="1325" y="714" text-anchor="middle">astrometry/io + data</text>
    <text class="module-subtitle" x="1325" y="735" text-anchor="middle">ADES, online observations, arrays</text>

    <rect class="module-white" x="1199" y="781" width="252" height="42" rx="7" />
    <text class="module-title" x="1325" y="807" text-anchor="middle">Observation Files</text>
    <line class="flow" x1="1325" y1="781" x2="1325" y2="744" />

    <path class="red-flow" d="M 1493 188 C 1530 188 1530 318 1506 318" />
    <path class="red-flow-soft" d="M 1508 321 C 1538 352 1538 450 1493 450" />
    <text class="red-label" x="1542" y="255" transform="rotate(90 1542 255)" text-anchor="middle">reject and refit</text>

    <text class="panel-label" x="1325" y="870" text-anchor="middle">(c) Orbit Determination</text>
  </g>

  <g id="shared-residual-operator">
    <path class="red-flow" d="M 968 318 C 1040 318 1086 318 1157 318" />
    <path class="red-flow" d="M 1157 344 C 1080 380 1038 436 968 448" />
    <rect class="note" x="1013" y="227" width="97" height="86" rx="10" />
    <text class="note-title" x="1061.5" y="252" text-anchor="middle">Residual</text>
    <text class="note-text" x="1061.5" y="275" text-anchor="middle">observed</text>
    <text class="note-text" x="1061.5" y="293" text-anchor="middle">minus model</text>
    <text class="red-label" x="1062" y="370" text-anchor="middle">prediction reused by fitting</text>
  </g>

  <g id="legend">
    <rect class="module-peach" x="545" y="891" width="26" height="16" rx="3" />
    <text class="tiny" x="579" y="904">state, dynamics, fitting modules</text>
    <rect class="module-blue" x="790" y="891" width="26" height="16" rx="3" />
    <text class="tiny" x="824" y="904">JAX/batch/reduction/integration modules</text>
    <rect class="module-green" x="1092" y="891" width="26" height="16" rx="3" />
    <text class="tiny" x="1126" y="904">data, kernels, weights, side inputs</text>
  </g>
</svg>
