<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
  <title id="title">Equinox-based and CIO-based ITRS to GCRS transformation paths</title>
  <desc id="desc">Two equivalent transformation chains from ITRS or WGS 84 to GCRS. The equinox-based path uses Greenwich apparent sidereal time and the CIO-based path uses the Earth Rotation Angle.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <style>
      .title { fill: #111827; font: 700 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
      .shared { fill: #eef6ff; stroke: #2563eb; }
      .final { fill: #ecfdf5; stroke: #059669; }
      .label { fill: #111827; font: 600 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .step { fill: #475569; font: italic 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .connector { stroke: #334155; stroke-width: 1.6; }
      .arrow { stroke: #334155; stroke-width: 1.6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1120" height="600" fill="#ffffff" />

  <text x="280" y="50" text-anchor="middle" class="title">Equinox-Based Transformation</text>
  <text x="840" y="50" text-anchor="middle" class="title">CIO-Based Transformation</text>

  <rect x="135" y="90" width="290" height="50" class="box shared" />
  <text x="280" y="122" text-anchor="middle" class="label">ITRS or WGS 84</text>

  <rect x="695" y="90" width="290" height="50" class="box shared" />
  <text x="840" y="122" text-anchor="middle" class="label">ITRS or WGS 84</text>

  <line x1="280" y1="150" x2="280" y2="162" class="connector" />
  <line x1="280" y1="192" x2="280" y2="205" class="arrow" />
  <text x="280" y="180" text-anchor="middle" class="step">polar motion</text>

  <line x1="840" y1="150" x2="840" y2="162" class="connector" />
  <line x1="840" y1="192" x2="840" y2="205" class="arrow" />
  <text x="840" y="180" text-anchor="middle" class="step">polar motion</text>

  <rect x="90" y="220" width="380" height="58" class="box" />
  <text x="280" y="244" text-anchor="middle" class="label">TIRS</text>
  <text x="280" y="268" text-anchor="middle" class="small">Terrestrial Intermediate Reference System</text>

  <rect x="650" y="220" width="380" height="58" class="box" />
  <text x="840" y="244" text-anchor="middle" class="label">TIRS</text>
  <text x="840" y="268" text-anchor="middle" class="small">Terrestrial Intermediate Reference System</text>

  <line x1="280" y1="288" x2="280" y2="300" class="connector" />
  <line x1="280" y1="330" x2="280" y2="350" class="arrow" />
  <text x="280" y="315" text-anchor="middle" class="step">Greenwich apparent sidereal time</text>

  <line x1="840" y1="288" x2="840" y2="300" class="connector" />
  <line x1="840" y1="330" x2="840" y2="350" class="arrow" />
  <text x="840" y="315" text-anchor="middle" class="step">Earth Rotation Angle</text>

  <rect x="90" y="365" width="380" height="58" class="box" />
  <text x="280" y="389" text-anchor="middle" class="label">True equator and equinox</text>
  <text x="280" y="413" text-anchor="middle" class="small">of date</text>

  <rect x="650" y="365" width="380" height="58" class="box" />
  <text x="840" y="389" text-anchor="middle" class="label">CIRS</text>
  <text x="840" y="413" text-anchor="middle" class="small">Celestial Intermediate Reference System</text>

  <line x1="280" y1="433" x2="280" y2="445" class="connector" />
  <line x1="280" y1="500" x2="280" y2="520" class="arrow" />
  <text x="280" y="462" text-anchor="middle" class="step">equinox-based rotation</text>
  <text x="280" y="486" text-anchor="middle" class="step">nutation + precession + frame bias</text>

  <line x1="840" y1="433" x2="840" y2="445" class="connector" />
  <line x1="840" y1="500" x2="840" y2="520" class="arrow" />
  <text x="840" y="462" text-anchor="middle" class="step">CIO-based rotation</text>
  <text x="840" y="486" text-anchor="middle" class="step">nutation + precession + frame bias</text>

  <rect x="210" y="535" width="140" height="54" class="box final" />
  <text x="280" y="569" text-anchor="middle" class="label">GCRS</text>

  <rect x="770" y="535" width="140" height="54" class="box final" />
  <text x="840" y="569" text-anchor="middle" class="label">GCRS</text>
</svg>
